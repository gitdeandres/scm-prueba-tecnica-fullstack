services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persiste la base de datos SQLite entre reinicios del contenedor
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/dev.db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      # Apunta al backend dentro de la red Docker
      - VITE_API_URL=http://localhost:8000
